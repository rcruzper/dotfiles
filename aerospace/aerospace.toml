config-version = 2

after-startup-command = []
start-at-login = true

# Normalization keeps the window tree clean
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'horizontal'

# Prevent accidental cmd-h hiding apps (common annoyance with tiling WMs)
automatically-unhide-macos-hidden-apps = true

[key-mapping]
    preset = 'qwerty'

# Mouse follows focus when focused monitor changes
#on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

[workspace-to-monitor-force-assignment]
    1 = 'main'
    2 = 'main'
    3 = 'main'
    C = 'secondary'
    D = 'secondary'
    E = 'secondary'
    M = 'secondary'
    O = 'secondary'
    R = 'secondary'
    S = 'secondary'
    T = 'secondary'
    V = 'secondary'

# Gaps between windows (inner-*) and between monitor edges (outer-*).
# Possible values:
# - Constant:     gaps.outer.top = 8
# - Per monitor:  gaps.outer.top = [{ monitor.main = 16 }, { monitor."some-pattern" = 32 }, 24]
#                 In this example, 24 is a default value when there is no match.
#                 Monitor pattern is the same as for 'workspace-to-monitor-force-assignment'.
#                 See: https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
[gaps]
    inner.horizontal = 8
    inner.vertical =   8
    outer.left =       8
    outer.bottom =     8
    outer.top =        8
    outer.right =      8

# 'main' binding mode declaration
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# 'main' binding mode must be always presented
# Fallback value (if you omit the key): mode.main.binding = {}
[mode.main.binding]

    # Layout toggles
    ctrl-alt-period = 'layout tiles horizontal vertical'
    ctrl-alt-comma = 'layout accordion horizontal vertical'

    # Vim-style focus (h/j/k/l)
    ctrl-alt-h = 'focus left'
    ctrl-alt-j = 'focus down'
    ctrl-alt-k = 'focus up'
    ctrl-alt-l = 'focus right'
    
    # Move windows (add Shift)
    ctrl-alt-shift-h = 'move left'
    ctrl-alt-shift-j = 'move down'
    ctrl-alt-shift-k = 'move up'
    ctrl-alt-shift-l = 'move right'
    
    # Resize
    ctrl-alt-minus = 'resize smart -50'
    ctrl-alt-equal = 'resize smart +50'
    
    # Workspaces
    ctrl-alt-1 = 'workspace 1'
    ctrl-alt-2 = 'workspace 2'
    ctrl-alt-3 = 'workspace 3'
    ctrl-alt-4 = 'workspace 4'
    ctrl-alt-5 = 'workspace 5'
    ctrl-alt-6 = 'workspace 6'
    ctrl-alt-7 = 'workspace 7'
    ctrl-alt-8 = 'workspace 8'
    ctrl-alt-9 = 'workspace 9'
    ctrl-alt-c = 'workspace C' # Calendar
    ctrl-alt-d = 'workspace D' # Claude
    ctrl-alt-e = 'workspace E' # Email
    ctrl-alt-m = 'workspace M' # Music
    ctrl-alt-o = 'workspace O' # Obsidian
    ctrl-alt-r = 'workspace R' # Linear
    ctrl-alt-s = 'workspace S' # Slack
    ctrl-alt-t = 'workspace T' # Telegram
    ctrl-alt-v = 'workspace V' # Video
    
    # See: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-workspace
    ctrl-alt-shift-1 = 'move-node-to-workspace 1 --focus-follows-window'
    ctrl-alt-shift-2 = 'move-node-to-workspace 2 --focus-follows-window'
    ctrl-alt-shift-3 = 'move-node-to-workspace 3 --focus-follows-window'
    ctrl-alt-shift-4 = 'move-node-to-workspace 4 --focus-follows-window'
    ctrl-alt-shift-5 = 'move-node-to-workspace 5 --focus-follows-window'
    ctrl-alt-shift-6 = 'move-node-to-workspace 6 --focus-follows-window'
    ctrl-alt-shift-7 = 'move-node-to-workspace 7 --focus-follows-window'
    ctrl-alt-shift-8 = 'move-node-to-workspace 8 --focus-follows-window'
    ctrl-alt-shift-9 = 'move-node-to-workspace 9 --focus-follows-window'
    ctrl-alt-shift-d = 'move-node-to-workspace D --focus-follows-window'
    ctrl-alt-shift-r = 'move-node-to-workspace R --focus-follows-window'
    ctrl-alt-shift-o = 'move-node-to-workspace O --focus-follows-window'
    ctrl-alt-shift-v = 'move-node-to-workspace V --focus-follows-window'
    
    # Workspace navigation
    alt-tab = 'workspace-back-and-forth'
    alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

    cmd-h = [] # Disable "hide application"
    cmd-alt-h = [] # Disable "hide others"

    # Join windows into containers (like i3 grouping)
    ctrl-alt-cmd-h = ['join-with left']
    ctrl-alt-cmd-j = ['join-with down']
    ctrl-alt-cmd-k = ['join-with up']
    ctrl-alt-cmd-l = ['join-with right']

    ctrl-alt-esc = ['reload-config', 'mode main']

    # See: https://nikitabobko.github.io/AeroSpace/commands#mode
    ctrl-alt-shift-semicolon = 'mode service'

# 'service' binding mode declaration.
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main'] # Reset loyout
    f = ['layout floating tiling', 'mode main'] # Toggle floating
    backspace = ['close-all-windows-but-current', 'mode main']

[[on-window-detected]]
    if.app-id = 'com.apple.iCal'
    run = "move-node-to-workspace C"

[[on-window-detected]]
    if.app-id = 'com.anthropic.claudefordesktop'
    run = "move-node-to-workspace D"

[[on-window-detected]]
    if.app-id = 'com.apple.mail'
    run = "move-node-to-workspace E"

[[on-window-detected]]
    if.app-id = 'com.spotify.client'
    run = "move-node-to-workspace M"

[[on-window-detected]]
    if.app-id = 'com.linear'
    run = "move-node-to-workspace R"

[[on-window-detected]]
    if.app-id = 'md.obsidian'
    run = "move-node-to-workspace O"

[[on-window-detected]]
    if.app-id = 'com.tinyspeck.slackmacgap'
    run = "move-node-to-workspace S"

[[on-window-detected]]
    if.app-id = 'ru.keepcoder.Telegram'
    run = "move-node-to-workspace T"

[[on-window-detected]]
    if.app-id = 'org.videolan.vlc'
    run = "move-node-to-workspace V"

